name: toydata_linear_probe_reproduce
logger:
  level: INFO
  path: ./logs/toydata_linear_probe.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: standardize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: linear
  seed: 7
  device: cuda
  epochs: 200
  learning_rate: 0.03
  batch_size: 8
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_linear_probe
method:
  name: probe
  seed: 7
  device: cuda
  desired_class: 1
  lr: 0.001
  lambda_: 0.01
  n_iter: 300
  t_max_min: 0.5
  norm: 1
  clamp: true
  loss_type: BCE
  noise_variance: 0.01
  invalidation_target: 0.45
  inval_target_eps: 0.01
evaluation:
  - name: validity
  - name: distance

