name: toydata_randomforest_mace_reproduce
logger:
  level: INFO
  path: ./logs/toydata_randomforest_mace.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: normalize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: randomforest
  seed: 7
  device: cpu
  n_estimators: 100
  max_depth: 4
method:
  name: mace
  seed: 7
  device: cpu
  desired_class: 1
  norm_type: ["zero_norm"]
evaluation:
  - name: validity
  - name: distance
