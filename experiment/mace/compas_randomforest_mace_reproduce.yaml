name: compas_randomforest_mace_reproduce
logger:
  level: INFO
  path: ./logs/compas_randomforest_mace_reproduce.log
caching:
  path: ./cache/
dataset:
  name: compas
preprocess:
  - name: balance
    seed: 54321
    strategy: downsample
    round_to: 250
    shuffle: true
    range: true
  - name: split
    seed: 54321
    split: 1350
model:
  name: randomforest
  seed: 54321
  device: cpu
  n_estimators: 100
  max_depth: null
  min_samples_split: 2
method:
  name: mace
  seed: 54321
  device: cpu
  desired_class: 1
  norm_type: zero_norm
  epsilon: 1.0e-5
evaluation:
  - name: validity
