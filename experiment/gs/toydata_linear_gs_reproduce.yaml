name: toydata_linear_gs_reproduce
logger:
  level: INFO
  path: ./logs/toydata_linear_gs.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: standardize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: linear
  seed: 7
  device: cuda
  epochs: 200
  learning_rate: 0.03
  batch_size: 8
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_linear_gs
method:
  name: gs
  seed: 7
  device: cuda
  desired_class: 1
  n_search_samples: 400
  p_norm: 2
  step: 0.15
  max_iter: 250
evaluation:
  - name: validity
  - name: distance

