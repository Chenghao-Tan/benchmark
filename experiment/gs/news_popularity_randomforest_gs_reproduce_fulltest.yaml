name: news_popularity_randomforest_gs_reproduce_fulltest
logger:
  level: INFO
  path: ./logs/news_popularity_randomforest_gs_fulltest.log
caching:
  path: ./cache/
dataset:
  name: news_popularity
preprocess:
  - name: scale
    seed: 42
    scaling: normalize
    range: true
  - name: split
    seed: 42
    split: 11893
model:
  name: randomforest
  seed: 42
  device: cpu
  n_estimators: 20
  max_depth: null
  min_samples_split: 2
  n_jobs: -1
method:
  name: gs
  seed: 42
  device: cpu
  eta: 0.001
  n_search_samples: 10000
  p_norm: 2
  max_iter: 1000
evaluation:
  - name: validity
  - name: distance
    metrics:
      - l0
      - l2
  - name: gs_l0_sparsity_local
    thresholds:
      - 5
      - 9
