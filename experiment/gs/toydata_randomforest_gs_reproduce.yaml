name: toydata_randomforest_gs_reproduce
logger:
  level: INFO
  path: ./logs/toydata_randomforest_gs.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: standardize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: randomforest
  seed: 7
  device: cpu
  n_estimators: 100
  max_depth: 4
method:
  name: gs
  seed: 7
  device: cpu
  desired_class: 1
  n_search_samples: 400
  p_norm: 2
  step: 0.15
  max_iter: 250
evaluation:
  - name: validity
  - name: distance

