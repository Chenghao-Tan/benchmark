name: toydata_linear_cfvae_reproduce
logger:
  level: INFO
  path: ./logs/toydata_linear_cfvae.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: normalize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: linear
  seed: 7
  device: cuda
  epochs: 200
  learning_rate: 0.03
  batch_size: 8
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_linear_cfvae
method:
  name: cfvae
  seed: 7
  device: cuda
  desired_class: 1
  encoded_size: 10
  train: true
  batch_size: 16
  epoch: 20
  learning_rate: 0.01
  n_samples: 10
  margin: 0.2
  validity_reg: 20
evaluation:
  - name: validity
  - name: distance
