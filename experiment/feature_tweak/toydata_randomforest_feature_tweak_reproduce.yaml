name: toydata_randomforest_feature_tweak_reproduce
logger:
  level: INFO
  path: ./logs/toydata_randomforest_feature_tweak.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: standardize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: randomforest
  seed: 7
  device: cpu
  n_estimators: 100
  max_depth: 4
method:
  name: feature_tweak
  seed: 7
  device: cpu
  desired_class: 1
  eps: 0.1
evaluation:
  - name: validity
  - name: distance

