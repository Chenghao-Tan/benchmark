name: bench_breast_cancer_linear_face
logger:
  level: INFO
  path: ./logs/benchmark_batch_2x2x5/bench_breast_cancer_linear_face.log
caching:
  path: ./cache/benchmark_batch_2x2x5/
dataset:
  name: breast_cancer
preprocess:
- name: scale
  seed: 42
  scaling: standardize
  range: true
- name: split
  seed: 42
  split: 0.2
  sample: 30
model:
  name: linear
  seed: 42
  device: cpu
  epochs: 80
  learning_rate: 0.01
  batch_size: 32
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
method:
  name: face
  seed: 42
  device: cpu
  desired_class: 1
  mode: knn
  fraction: 0.2
evaluation:
- name: validity
- name: distance
  metrics:
  - l0
  - l1
  - l2
  - linf
- name: ynn
  k: 5
- name: runtime

