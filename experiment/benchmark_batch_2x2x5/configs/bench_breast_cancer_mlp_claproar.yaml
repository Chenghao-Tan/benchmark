name: bench_breast_cancer_mlp_claproar
logger:
  level: INFO
  path: ./logs/benchmark_batch_2x2x5/bench_breast_cancer_mlp_claproar.log
caching:
  path: ./cache/benchmark_batch_2x2x5/
dataset:
  name: breast_cancer
preprocess:
- name: scale
  seed: 42
  scaling: standardize
  range: true
- name: split
  seed: 42
  split: 0.2
  sample: 30
model:
  name: mlp
  seed: 42
  device: cpu
  epochs: 120
  learning_rate: 0.005
  batch_size: 32
  layers:
  - 64
  - 32
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
method:
  name: claproar
  seed: 42
  device: cpu
  desired_class: 1
  individual_cost_lambda: 0.1
  external_cost_lambda: 0.1
  learning_rate: 0.01
  max_iter: 200
  tol: 0.0001
evaluation:
- name: validity
- name: distance
  metrics:
  - l0
  - l1
  - l2
  - linf
- name: ynn
  k: 5
- name: runtime

