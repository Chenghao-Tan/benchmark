name: toydata_linear_dice_reproduce
logger:
  level: INFO
  path: ./logs/toydata_linear_dice.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: standardize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: linear
  seed: 7
  device: cuda
  epochs: 200
  learning_rate: 0.03
  batch_size: 8
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_linear_dice
method:
  name: dice
  seed: 7
  device: cuda
  desired_class: 1
  num: 1
  posthoc_sparsity_param: 0.0
evaluation:
  - name: validity
  - name: distance

