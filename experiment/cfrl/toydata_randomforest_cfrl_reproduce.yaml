name: toydata_randomforest_cfrl_reproduce
logger:
  level: INFO
  path: ./logs/toydata_randomforest_cfrl.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: normalize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: randomforest
  seed: 7
  device: cpu
  n_estimators: 100
  max_depth: 4
method:
  name: cfrl
  seed: 7
  device: cpu
  desired_class: 1
  autoencoder_batch_size: 16
  autoencoder_target_steps: 200
  autoencoder_lr: 0.001
  autoencoder_latent_dim: 8
  autoencoder_hidden_dim: 32
  coeff_sparsity: 0.5
  coeff_consistency: 0.5
  train_steps: 300
  batch_size: 16
evaluation:
  - name: validity
  - name: distance
