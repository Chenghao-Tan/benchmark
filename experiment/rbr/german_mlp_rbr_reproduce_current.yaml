name: german_mlp_rbr_reproduce_current
logger:
  level: INFO
  path: ./logs/german_mlp_rbr_reproduce_current.log
caching:
  path: ./cache/
reproduce:
  seed: 54321
  num_factuals: 10
  factual_seed: 54321
  future_fraction: 0.2
  future_seeds:
    - 1
    - 2
    - 3
    - 4
    - 5
  current_validity_min: 0.9
  future_validity_min: 0.7
dataset:
  name: german
preprocess:
  - name: rbr_german_aggregate
    seed: 42
  - name: scale
    seed: 42
    scaling: standardize
    range: true
  - name: encode
    seed: 42
    encoding: onehot
  - name: split
    seed: 42
    split: 0.2
model:
  name: mlp
  seed: 54321
  device: cpu
  epochs: 100
  learning_rate: 0.001
  batch_size: 1000
  layers:
    - 20
    - 50
    - 20
  optimizer: adam
  criterion: bce
  output_activation: sigmoid
method:
  name: rbr
  seed: 54321
  device: cpu
  desired_class: 1
  num_samples: 200
  perturb_radius: 0.2
  delta_plus: 1.0
  sigma: 1.0
  epsilon_op: 0.5
  epsilon_pe: 1.0
  max_iter: 1000
  random_state: 54321
  enforce_encoding: true
evaluation:
  - name: validity
  - name: distance
