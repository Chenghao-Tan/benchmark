name: toydata_mlp_rbr_reproduce
logger:
  level: INFO
  path: ./logs/toydata_mlp_rbr.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: standardize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: mlp
  seed: 7
  device: cuda
  epochs: 220
  learning_rate: 0.01
  batch_size: 8
  layers: [32, 16]
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_mlp_rbr
method:
  name: rbr
  seed: 7
  device: cuda
  desired_class: 1
  num_samples: 200
  perturb_radius: 0.2
  delta_plus: 1.0
  sigma: 1.0
  epsilon_op: 1.0
  epsilon_pe: 1.0
  max_iter: 400
  clamp: false
evaluation:
  - name: validity
  - name: distance
