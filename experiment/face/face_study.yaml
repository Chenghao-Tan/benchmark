runs:
  - group: kde
    label: kde_eps_0.25
    mode: kde
    epsilon: 0.25
    prediction_threshold: 0.75
    density_threshold: 0.001
    caption: "epsilon = 0.25"
    triptych_output_path: "./cache/face/kde_triptych.png"
    query_point: { x1: 0.1465, x2: 0.7269, y: 0 }
    experiment:
      name: synthetic_face_kde_eps_0.25
      logger: { level: INFO, path: ./logs/synthetic_face_kde_eps_0.25.log }
      caching: { path: ./cache/ }
      dataset: { name: synthetic_face }
      preprocess:
        - { name: scale, seed: 482, scaling: normalize, range: true }
      model:
        name: mlp
        seed: 482
        device: cuda
        epochs: 320
        learning_rate: 0.01
        batch_size: 16
        layers: [10, 10]
        optimizer: adam
        criterion: cross_entropy
        output_activation: softmax
        save_name: null
      method:
        name: face
        seed: 482
        device: cuda
        desired_class: 1
        mode: kde
        epsilon: 0.25
        prediction_threshold: 0.75
        density_threshold: 0.001
        weight_function: negative_log
        kde_bandwidth: 0.5
        kde_kernel: tophat
        store_top_k_paths: 5
      evaluation:
        - { name: validity }
        - { name: distance, metrics: [l2] }
        - { name: face_path_metrics_local }
    query_experiment:
      name: synthetic_face_kde_eps_0.25_query
      logger: { level: INFO, path: ./logs/synthetic_face_kde_eps_0.25_query.log }
      caching: { path: ./cache/ }
      dataset: { name: synthetic_face }
      preprocess:
        - { name: scale, seed: 482, scaling: normalize, range: true }
