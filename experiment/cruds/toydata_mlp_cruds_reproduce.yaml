name: toydata_mlp_cruds_reproduce
logger:
  level: INFO
  path: ./logs/toydata_mlp_cruds.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: normalize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: mlp
  seed: 7
  device: cuda
  epochs: 220
  learning_rate: 0.01
  batch_size: 8
  layers: [32, 16]
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_mlp_cruds
method:
  name: cruds
  seed: 7
  device: cuda
  desired_class: 1
  lambda_param: 0.001
  optimizer: RMSprop
  lr: 0.008
  max_iter: 300
  target_class: [0.0, 1.0]
  vae_params:
    layers: [8, 4]
    train: true
    epochs: 20
    lr: 0.001
    batch_size: 16
evaluation:
  - name: validity
  - name: distance

