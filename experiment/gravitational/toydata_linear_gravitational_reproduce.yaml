name: toydata_linear_gravitational_reproduce
logger:
  level: INFO
  path: ./logs/toydata_linear_gravitational.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: standardize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: linear
  seed: 7
  device: cuda
  epochs: 200
  learning_rate: 0.03
  batch_size: 8
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_linear_gravitational
method:
  name: gravitational
  seed: 7
  device: cuda
  desired_class: 1
  prediction_loss_lambda: 1.0
  original_dist_lambda: 0.5
  grav_penalty_lambda: 1.5
  learning_rate: 0.01
  num_steps: 150
  scheduler_step_size: 100
  scheduler_gamma: 0.5
evaluation:
  - name: validity
  - name: distance

