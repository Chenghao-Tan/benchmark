name: toydata_mlp_claproar_reproduce
logger:
  level: INFO
  path: ./logs/toydata_mlp_claproar.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: standardize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: mlp
  seed: 7
  device: cuda
  epochs: 220
  learning_rate: 0.01
  batch_size: 8
  layers: [32, 16]
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_mlp_claproar
method:
  name: claproar
  seed: 7
  device: cuda
  desired_class: 1
  individual_cost_lambda: 0.1
  external_cost_lambda: 0.1
  learning_rate: 0.01
  max_iter: 150
  tol: 0.0001
evaluation:
  - name: validity
  - name: distance

