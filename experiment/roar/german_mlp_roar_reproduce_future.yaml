name: german_mlp_roar_reproduce_future
logger:
  level: INFO
  path: ./logs/german_mlp_roar_reproduce_future.log
caching:
  path: ./cache/
dataset:
  name: german_roar
preprocess:
  - name: scale
    seed: 42
    scaling: standardize
    range: true
  - name: encode
    seed: 42
    encoding: onehot
  - name: split
    seed: 42
    split: 0.2
model:
  name: mlp
  seed: 42
  device: cpu
  epochs: 100
  learning_rate: 0.001
  batch_size: 1000
  layers:
    - 50
    - 100
    - 200
  optimizer: adam
  criterion: bce
  output_activation: sigmoid
  save_name: german_roar_future_mlp
method:
  name: roar
  seed: 0
  device: cpu
  desired_class: 1
  lr: 0.001
  lambda_: 0.1
  delta_max: 0.1
  norm: 1
  max_minutes: 0.5
  loss_type: BCE
  loss_threshold: 0.0001
  lime_seed: 0
  discretize_continuous: false
  enforce_encoding: false
  sample_around_instance: true
evaluation:
  - name: validity
  - name: distance
