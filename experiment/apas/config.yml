dataset:
  name: diabetes
  path: ./dataset/diabetes/

reproduction:
  seed_numpy: 1
  seed_model: 0
  d1_size: 384
  d1_train_test_split: 0.2
  gap: 0.25
  num_test_instances: 500
  num_sound_instances: 50

model:
  device: auto
  hidden_layer_sizes:
    - 8
  activation: relu
  solver: adam
  learning_rate: adaptive
  learning_rate_init: 0.01
  batch_size: 8
  max_iter: 7000

apas:
  desired_class: 1
  alpha: 0.999
  r: 0.995
  delta_init: 0.0001
  delta_source: delta_min
  num_concretizations: 10000
  eps_init: 0.01
  eps_step: 0.2
  max_iter: 100
  big_m: 10000.0
  use_biases: true
  rounding: null

