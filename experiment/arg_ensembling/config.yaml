name: compas_arg_ensembling_table4_reproduction
logger:
  level: INFO
  path: null
caching:
  path: ./cache/

dataset:
  name: compas_carla
  path: ./dataset/compas_carla/

reproduction:
  seed: 3333
  outer_split_random_state: 10
  max_test_points: 500
  outer_test_size: 0.2
  pool_target_size: 150
  repeats: 5
  model_sizes:
    - 10
    - 20
    - 30
  hidden_layer_sizes:
    - [15, 15]
    - [20, 15]
    - [20, 20]
    - [30, 20]
    - [30, 25]
  simplicity_scores:
    - 0.0
    - 0.25
    - 0.5
    - 0.75
    - 1.0
  inner_split: 0.2
  sklearn:
    learning_rate: adaptive
    batch_size: 64
    learning_rate_init: 0.02
    max_iter: 200
