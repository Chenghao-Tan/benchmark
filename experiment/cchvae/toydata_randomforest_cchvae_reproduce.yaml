name: toydata_randomforest_cchvae_reproduce
logger:
  level: INFO
  path: ./logs/toydata_randomforest_cchvae.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: normalize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: randomforest
  seed: 7
  device: cpu
  n_estimators: 100
  max_depth: 4
method:
  name: cchvae
  seed: 7
  device: cpu
  desired_class: 1
  n_search_samples: 300
  p_norm: 1
  step: 0.1
  max_iter: 200
  clamp: true
  vae_params:
    layers: [8, 4]
    train: true
    kl_weight: 0.3
    lambda_reg: 0.000001
    epochs: 20
    lr: 0.001
    batch_size: 16
evaluation:
  - name: validity
  - name: distance

