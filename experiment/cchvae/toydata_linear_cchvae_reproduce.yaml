name: toydata_linear_cchvae_reproduce
logger:
  level: INFO
  path: ./logs/toydata_linear_cchvae.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: normalize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: linear
  seed: 7
  device: cuda
  epochs: 200
  learning_rate: 0.03
  batch_size: 8
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_linear_cchvae
method:
  name: cchvae
  seed: 7
  device: cuda
  desired_class: 1
  n_search_samples: 300
  p_norm: 1
  step: 0.1
  max_iter: 200
  clamp: true
  vae_params:
    layers: [8, 4]
    train: true
    kl_weight: 0.3
    lambda_reg: 0.000001
    epochs: 20
    lr: 0.001
    batch_size: 16
evaluation:
  - name: validity
  - name: distance
