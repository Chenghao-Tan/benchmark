name: toydata_mlp_wachter_reproduce
logger:
  level: INFO
  path: ./logs/toydata_mlp_wachter.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: standardize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: mlp
  seed: 7
  device: cuda
  epochs: 220
  learning_rate: 0.01
  batch_size: 8
  layers: [32, 16]
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_mlp_wachter
method:
  name: wachter
  seed: 7
  device: cuda
  desired_class: 1
  lr: 0.01
  lambda_: 0.01
  n_iter: 400
  t_max_min: 0.5
  norm: 1
  clamp: true
  loss_type: BCE
evaluation:
  - name: validity
  - name: distance

