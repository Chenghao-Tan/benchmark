name: toydata_mlp_clue_reproduce
logger:
  level: INFO
  path: ./logs/toydata_mlp_clue.log
caching:
  path: ./cache/
dataset:
  name: toydata
preprocess:
  - name: scale
    seed: 7
    scaling: normalize
    range: true
  - name: split
    seed: 7
    split: 0.25
model:
  name: mlp
  seed: 7
  device: cuda
  epochs: 220
  learning_rate: 0.01
  batch_size: 8
  layers: [32, 16]
  optimizer: adam
  criterion: cross_entropy
  output_activation: softmax
  save_name: toydata_mlp_clue
method:
  name: clue
  seed: 7
  device: cuda
  desired_class: 1
  train_vae: true
  width: 10
  depth: 3
  latent_dim: 12
  batch_size: 32
  epochs: 5
  lr: 0.001
  early_stop: 5
evaluation:
  - name: validity
  - name: distance
